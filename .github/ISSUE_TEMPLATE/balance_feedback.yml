name: ฟีดแบ็กสมดุลเกม
description: รายงานการ์ดหรือกติกาที่อาจสมดุลเกินไปหรืออ่อนเกินไป
title: "[Balance]: "
labels: ["balance", "playtest", "phase-7"]
body:
  - type: markdown
    attributes:
      value: "อย่าปรับสมดุลจากความเห็นเดี่ยว โปรดแนบหลักฐานจากหลาย match เมื่อเป็นไปได้ และอย่าใส่ข้อมูลส่วนตัวหรือข้อมูลลับ"
  - type: input
    id: card
    attributes:
      label: การ์ดหรือระบบที่เกี่ยวข้อง
      placeholder: "เช่น X005 Food Thief"
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: หลักฐานจากการเล่น
      description: ระบุจำนวน match, สถานการณ์, score, turn และผลลัพธ์
    validations:
      required: true
  - type: dropdown
    id: recommendation
    attributes:
      label: ข้อเสนอเบื้องต้น
      options:
        - no balance patch
        - minor balance patch
        - major rules review
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Match log หรือ Playtest feedback JSON
      description: แนบไฟล์ JSON ถ้ามี
    validations:
      required: false
